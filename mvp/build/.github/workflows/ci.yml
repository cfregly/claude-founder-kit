name: ci
on: [push, pull_request]
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anthropic python-dotenv rich mcp
      - name: Compile scripts
        run: python -m py_compile 01_first_call.py 02_agent_with_tools.py 03_evals.py 04_cost_engineering.py 05_agent_sdk_repo_doctor.py eval_lint.py mcp_server/startup_metrics_server.py starter/app.py
      - name: 04 fails fast without a key (non-zero exit)
        run: |
          if env -u ANTHROPIC_API_KEY PYTHON_DOTENV_DISABLED=1 python 04_cost_engineering.py; then
            echo "04_cost_engineering.py exited 0 without a key, expected non-zero"
            exit 1
          fi
      - name: Lint the eval set (the retention moat)
        run: |
          python eval_lint.py --selftest
          python eval_lint.py data/golden_set.jsonl
      - name: Live entrypoints fail cleanly without a key
        run: python scripts/check_live_entrypoints.py
      - name: Doc-correctness gate
        run: python scripts/check_docs.py
      - name: De-slop the README
        run: PYTHONPATH=../../quality python -m deslop README.md
