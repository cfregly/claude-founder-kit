name: ci

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Deterministic report reproduces offline
        run: python -m activation operate examples/readout.json --weekly --prev examples/prev_week_state.json

      - name: Test suite
        run: python -m pytest tests/ -q

      - name: Doc-correctness gate
        run: python scripts/check_docs.py

      - name: Gate audit (nothing outward ran unattended)
        run: |
          python -m activation gen-examples
          python -m activation operate examples/readout.json --audit-gates

      - name: Platform coverage map
        run: make coverage

      - name: De-slop the README
        run: |
          export PYTHONPATH=../quality
          python -m deslop README.md
