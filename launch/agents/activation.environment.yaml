# Version-controlled Managed Agents environment. Apply with the ant CLI:
#   ENV_ID=$(ant beta:environments create < agents/activation.environment.yaml --transform id -r)
# limited networking so the MCP server and package managers are reachable, nothing else.
name: activation-env
config:
  type: cloud
  networking:
    type: limited
    allow_mcp_servers: true
    allow_package_managers: true
