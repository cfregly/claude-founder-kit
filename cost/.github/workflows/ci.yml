name: ci

on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - name: deslop gate (README and CLAUDE.md)
        run: python scripts/deslop_check.py
      - name: compile check
        run: python -m compileall cost_control run.py scripts
      - name: fails fast without a key (non-zero exit)
        run: |
          if env -u ANTHROPIC_API_KEY PYTHON_DOTENV_DISABLED=1 python run.py; then
            echo "run.py exited 0 without a key, expected non-zero"
            exit 1
          fi
