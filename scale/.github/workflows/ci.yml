name: ci

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Deterministic readout reproduces offline
        run: python -m scale examples/cohort.json --json

      - name: Doc-correctness gate
        run: make check

      - name: Test suite
        run: |
          pip install --quiet pytest
          make test

      - name: De-slop the README
        run: |
          export PYTHONPATH=../quality
          python -m deslop README.md
